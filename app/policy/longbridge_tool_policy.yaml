longbridge_tool_policy:
  version: 3
  default_deny_unknown: true
  discovery_required: true
  allowed_market_tools_before_discovery: []

  required_market_tools:
    - quote
    - candlesticks
    - intraday
    - market_status
    - trading_session

  account_read_disabled_by_default:
    - account_balance
    - stock_positions
    - today_orders
    - history_orders
    - today_executions
    - history_executions
    - statement_list

  trading_blocked:
    - submit_order
    - replace_order
    - cancel_order
    - withdrawals
    - dca_create
    - dca_update
    - dca_stop
    - dca_pause
    - dca_resume
    - alert_add
    - alert_delete
    - alert_disable
    - alert_enable
    - create_watchlist_group
    - delete_watchlist_group
    - update_watchlist_group
    - sharelist_add
    - sharelist_create
    - sharelist_delete
    - sharelist_remove
    - sharelist_sort
    - topic_create
    - topic_create_reply
