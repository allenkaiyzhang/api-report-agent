<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Control</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #202124; }
    nav a { margin-right: 12px; }
    button { display: block; margin: 12px 0; padding: 10px 14px; }
    input { padding: 8px; width: 360px; }
    pre { background: #f5f5f5; padding: 12px; }
  </style>
</head>
<body>
  <h1>Control</h1>
  <nav>
    <a href="/ui/dashboard">Dashboard</a>
    <a href="/ui/reports">Reports</a>
    <a href="/ui/control">Control</a>
  </nav>

  <p>POST controls require <code>X-API-Token</code>.</p>
  <input id="token" type="password" placeholder="API control token">

  <button onclick="run('/control/run-regular-pipeline')">Run regular pipeline</button>
  <button onclick="run('/control/run-extended-pipeline')">Run extended pipeline</button>
  <button onclick="run('/control/run-daily-report')">Run daily report</button>
  <button onclick="run('/control/run-extended-report')">Run extended report</button>

  <pre id="result"></pre>
  <script>
    async function run(path) {
      const response = await fetch(path, {
        method: 'POST',
        headers: {'X-API-Token': document.getElementById('token').value}
      });
      document.getElementById('result').textContent = JSON.stringify(await response.json(), null, 2);
    }
  </script>
</body>
</html>
