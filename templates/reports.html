<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reports</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #202124; }
    nav a { margin-right: 12px; }
    table { border-collapse: collapse; width: 100%; margin-top: 24px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Reports</h1>
  <nav>
    <a href="/ui/dashboard">Dashboard</a>
    <a href="/ui/reports">Reports</a>
    <a href="/ui/control">Control</a>
  </nav>
  <table>
    <tr><th>Path</th><th>Type</th><th>Size</th><th>Modified</th><th>API</th></tr>
    {% for report in reports %}
    <tr>
      <td>{{ report.path }}</td>
      <td>{{ report.type }}</td>
      <td>{{ report.size_bytes }}</td>
      <td>{{ report.modified_at }}</td>
      <td><a href="/reports/{{ report.report_id }}">JSON</a></td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
