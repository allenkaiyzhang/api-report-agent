name: Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Specific commit SHA to deploy (defaults to current trigger commit)'
        required: false
        type: string
        default: ''
      allow_dirty:
        description: 'Allow deployment with dirty working tree'
        required: false
        type: boolean
        default: false

concurrency:
  group: api-report-agent-ecs-deploy
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI workflow succeeded for target commit
        env:
          TARGET_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Checking CI status for commit: $TARGET_SHA"
          CI_CONCLUSION=$(gh run list --repo "$GH_REPO" --workflow=CI --commit="$TARGET_SHA" --json status,conclusion --jq '[.[] | select(.status=="completed")] | .[0].conclusion // "not_found"')
          echo "CI conclusion for commit $TARGET_SHA: $CI_CONCLUSION"
          if [ "$CI_CONCLUSION" != "success" ]; then
            echo "ERROR: CI workflow has not passed for commit $TARGET_SHA (conclusion: ${CI_CONCLUSION:-not_found})" >&2
            exit 1
          fi
          echo "CI workflow passed for commit $TARGET_SHA"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
          ALLOW_DIRTY: ${{ github.event.inputs.allow_dirty || 'false' }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          envs: TARGET_SHA,ALLOW_DIRTY
          script: |
            set -euo pipefail
            whoami
            
            # Target path check
            DEPLOY_DIR="/opt/api-report-agent"
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "ERROR: Deploy directory $DEPLOY_DIR does not exist on remote host!" >&2
              exit 1
            fi
            cd "$DEPLOY_DIR"

            # 1. Network prechecks
            # TODO: If ECS/VPS GitHub access remains unstable, switch CD to artifact-based
            # deploy where GitHub Actions packages and uploads the release instead of the
            # server running git fetch.
            echo "Running network prechecks..."
            if ! getent hosts github.com >/dev/null 2>&1; then
              echo "ERROR: DNS Resolution Failed. Could not resolve host github.com" >&2
              echo "--- /etc/resolv.conf ---" >&2
              cat /etc/resolv.conf >&2 || true
              exit 1
            fi

            if ! curl -I --connect-timeout 20 --retry 3 --retry-delay 5 https://github.com >/dev/null 2>&1; then
              echo "WARNING: Failed to establish HTTP connection to https://github.com (this is non-fatal; git ls-remote will be the real gate)" >&2
            fi

            REPO_URL=$(git remote get-url origin)
            if ! git ls-remote "$REPO_URL" HEAD >/dev/null 2>&1; then
              echo "ERROR: git ls-remote failed for repository URL: $REPO_URL" >&2
              echo "Please verify SSH keys / access credentials on deployment server." >&2
              echo "--- /etc/resolv.conf ---" >&2
              cat /etc/resolv.conf >&2 || true
              exit 1
            fi
            echo "Network prechecks passed successfully!"

            # 2. Fetch latest refs (ensures updated .gitignore is available)
            echo "Fetching latest refs from origin..."
            git fetch origin

            # 3. Worktree state verification
            echo "Checking git working tree status..."

            # 3a. Tracked modifications — hard gate
            TRACKED_MODS=$(git status --porcelain --untracked-files=no)
            if [ -n "$TRACKED_MODS" ]; then
              echo "ERROR: Tracked files have been modified on the remote host:" >&2
              echo "$TRACKED_MODS" >&2
              if [ "$ALLOW_DIRTY" != "true" ]; then
                echo "" >&2
                echo "Deployment blocked. To resolve:" >&2
                echo "  - If these are chmod-only changes, set: git config core.filemode false" >&2
                echo "    or commit the executable bits and push." >&2
                echo "  - Otherwise, stash or commit your changes on the remote host." >&2
                echo "  - Or set allow_dirty=true in the workflow dispatch." >&2
                exit 1
              else
                echo "Bypassing tracked modifications check because allow_dirty=true."
              fi
            fi

            # 3b. Untracked files — warning only; runtime data is non-blocking
            UNTRACKED=$(git ls-files --others --exclude-standard | grep -v -E '^(data/(metrics|normalized|quality|archive|notifications)/|logs/|.*\.log$)' || true)
            if [ -n "$UNTRACKED" ]; then
              echo "WARNING: Untracked files exist on the remote host (non-blocking):" >&2
              echo "$UNTRACKED" >&2
            fi

            # 4. Checkout specific commit SHA
            echo "Resetting checkout to target SHA: $TARGET_SHA"
            git reset --hard "$TARGET_SHA"

            # 5. Make deployment scripts executable
            chmod +x scripts/deploy.sh scripts/post_deploy_verify.sh

            # 6. Run deployment
            echo "Executing scripts/deploy.sh..."
            ./scripts/deploy.sh

            # 7. Run post-deployment validation
            echo "Executing scripts/post_deploy_verify.sh..."
            ./scripts/post_deploy_verify.sh
