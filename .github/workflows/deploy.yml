name: Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Specific commit SHA to deploy (defaults to current trigger commit)'
        required: false
        type: string
        default: ''
      allow_dirty:
        description: 'Allow deployment with dirty working tree'
        required: false
        type: boolean
        default: false

concurrency:
  group: api-report-agent-ecs-deploy
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI workflow succeeded for target commit
        env:
          TARGET_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Checking CI status for commit: $TARGET_SHA"
          CI_CONCLUSION=$(gh run list --workflow=CI --commit="$TARGET_SHA" --json status,conclusion --jq '[.[] | select(.status=="completed")] | .[0].conclusion // "not_found"')
          echo "CI conclusion for commit $TARGET_SHA: $CI_CONCLUSION"
          if [ "$CI_CONCLUSION" != "success" ]; then
            echo "ERROR: CI workflow has not passed for commit $TARGET_SHA (conclusion: ${CI_CONCLUSION:-not_found})" >&2
            exit 1
          fi
          echo "CI workflow passed for commit $TARGET_SHA"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
          ALLOW_DIRTY: ${{ github.event.inputs.allow_dirty || 'false' }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          envs: TARGET_SHA,ALLOW_DIRTY
          script: |
            set -euo pipefail
            whoami
            
            # Target path check
            DEPLOY_DIR="/opt/api-report-agent"
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "ERROR: Deploy directory $DEPLOY_DIR does not exist on remote host!" >&2
              exit 1
            fi
            cd "$DEPLOY_DIR"

            # 1. Network prechecks
            echo "Running network prechecks..."
            if ! getent hosts github.com >/dev/null 2>&1; then
              echo "ERROR: DNS Resolution Failed. Could not resolve host github.com" >&2
              echo "--- /etc/resolv.conf ---" >&2
              cat /etc/resolv.conf >&2 || true
              exit 1
            fi

            if ! curl -I --connect-timeout 5 https://github.com >/dev/null 2>&1; then
              echo "ERROR: Failed to establish HTTP connection to https://github.com (Access timeout)" >&2
              echo "--- /etc/resolv.conf ---" >&2
              cat /etc/resolv.conf >&2 || true
              exit 1
            fi

            REPO_URL=$(git remote get-url origin)
            if ! git ls-remote "$REPO_URL" HEAD >/dev/null 2>&1; then
              echo "ERROR: git ls-remote failed for repository URL: $REPO_URL" >&2
              echo "Please verify SSH keys / access credentials on deployment server." >&2
              exit 1
            fi
            echo "Network prechecks passed successfully!"

            # 2. Worktree state verification
            echo "Checking git working tree status..."
            DIRTY_FILES=$(git status --porcelain)
            if [ -n "$DIRTY_FILES" ]; then
              echo "WARNING: Uncommitted local modifications exist on the remote host." >&2
              git status --short >&2
              if [ "$ALLOW_DIRTY" != "true" ]; then
                echo "ERROR: Refusing deployment with dirty working tree. Commit/stash your changes or set allow_dirty to true." >&2
                exit 1
              else
                echo "Bypassing dirty tree check because allow_dirty=true is specified."
              fi
            fi

            # 3. Checkout specific commit SHA
            echo "Fetching and resetting checkout to target SHA: $TARGET_SHA"
            git fetch origin
            git reset --hard "$TARGET_SHA"
            
            # 4. Make deployment scripts executable
            chmod +x scripts/deploy.sh scripts/post_deploy_verify.sh

            # 5. Run deployment
            echo "Executing scripts/deploy.sh..."
            ./scripts/deploy.sh

            # 6. Run post-deployment validation
            echo "Executing scripts/post_deploy_verify.sh..."
            ./scripts/post_deploy_verify.sh
