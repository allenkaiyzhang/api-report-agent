name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: api-report-agent-ecs-deploy
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          if [ -f requirements.txt ]; then
            .venv/bin/python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            .venv/bin/python -m pip install -r requirements-dev.txt
          fi
          .venv/bin/python -m pip install pytest

      - name: Compile
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: .venv/bin/python -m compileall .

      - name: Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          AI_ANALYSIS_ENABLED: "false"
          AI_PROVIDER: mock
          AI_FALLBACK_PROVIDER: mock
          MARKET_DATA_PROVIDER: mock
          EMAIL_ENABLED: "false"
          DAILY_CHECK_EMAIL_ENABLED: "false"
          RUN_LONGBRIDGE_API_TESTS: "0"
          DEEPSEEK_API_KEY: ""
          OPENAI_API_KEY: ""
          GEMINI_API_KEY: ""
        run: |
          if [ -d tests ]; then
            .venv/bin/python -m pytest -q
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          script: |
            set -e
            whoami
            cd /opt/api-report-agent
            git pull --ff-only
            chmod +x scripts/deploy.sh scripts/smoke_test.sh scripts/tail_logs.sh
            scripts/deploy.sh
            scripts/smoke_test.sh
